<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruangguru Coding: Python Level 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        
        /* Theme Colors: Dark Slate + Cyan/Fuchsia Accents */
        .header-gradient {
            background: linear-gradient(135deg, #0e7490 0%, #4f46e5 100%);
        }
        
        .code-bg {
            background: #0f172a; /* bg-slate-900 */
            position: relative;
            overflow: hidden;
        }
        
        .code-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(34, 211, 238, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(232, 121, 249, 0.15) 0%, transparent 50%);
            pointer-events: none;
            filter: blur(20px);
        }
        
        .floating-code {
            position: absolute;
            font-family: 'JetBrains Mono', monospace;
            color: rgba(34, 211, 238, 0.1);
            font-size: 14px;
            animation: float 25s infinite linear;
            white-space: nowrap;
            pointer-events: none;
        }
        
        @keyframes float {
            0% { transform: translateX(-100px) translateY(0px); }
            100% { transform: translateX(calc(100vw + 100px)) translateY(-20px); }
        }

        .main-pattern {
            background-color: #020617; /* bg-slate-950 */
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .code-font {
            font-family: 'JetBrains Mono', monospace;
        }

        .slide-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        /* Syntax Highlighting Mockup */
        .token-kw { color: #e879f9; font-weight: bold; } /* Fuchsia-400 */
        .token-class { color: #22d3ee; font-weight: bold; } /* Cyan-400 */
        .token-func { color: #facc15; } /* Yellow-400 */
        .token-str { color: #a3e635; } /* Lime-400 */
        .token-comment { color: #94a3b8; font-style: italic; } /* Slate-400 */
        .token-num { color: #fb923c; } /* Orange-400 */

        /* Welcome Overlay Styles */
        #welcomeOverlay {
            position: fixed;
            inset: 0;
            background-color: #020617;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out;
        }
        .fade-in { animation: fadeIn 1s ease-in forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }
        .delay-500ms { animation-delay: 0.5s; }
        .bounce-slow { animation: bounce 2s infinite; }

        /* --- VISUAL ELEVATION: Realistic Window Mocks --- */
        .mock-window {
            background: #e2e8f0; /* bg-slate-200 */
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif; /* Windows-like font */
            border: 1px solid #94a3b8;
        }
        .mock-window-header {
            background: #f1f5f9;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #cbd5e1;
        }
        .mock-window-title {
            font-size: 12px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mock-window-controls {
            display: flex;
            gap: 6px;
        }
        .win-btn { width: 10px; height: 10px; border-radius: 50%; }
        .win-close { background: #ef4444; }
        .win-min { background: #eab308; }
        .win-max { background: #22c55e; }
        
        .mock-window-content {
            background: white;
            padding: 16px;
            color: #1e293b;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- ANIMATED ROADMAP --- */
        .roadmap-container {
            position: relative;
            padding: 20px;
        }
        .roadmap-path {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 4px;
            background: #334155;
            z-index: 0;
            transform: translateY(-50%);
        }
        .roadmap-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, #22d3ee, #e879f9);
            width: 0%;
            transition: width 1.5s ease-out;
        }
        .roadmap-step {
            width: 60px;
            height: 60px;
            background: #1e293b;
            border: 4px solid #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }
        .roadmap-step.active {
            border-color: #22d3ee;
            background: #0f172a;
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.4);
        }
        .roadmap-step.active .step-icon {
            animation: bounce 1s infinite;
        }
        
        /* Particle Effects for Juice */
        /* Particle Effects for Juice */
        .particle {
            position: absolute;
            animation: float-idle 4s ease-in-out infinite;
            pointer-events: none;
            opacity: 0.9;
        }

        @keyframes float-idle {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
        }
        
        /* --- ROADMAP V2: Game Level Map --- */
        .level-container {
            position: relative;
            width: 100%;
            max-width: 850px;
            height: 400px; /* Taller to prevent crop */
            background: radial-gradient(circle at center, #1e293b 0%, #020617 70%);
            border: 2px solid #334155;
            border-radius: 20px;
            overflow: visible; /* Allow hover elements to pop out */
            margin: 20px auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.5);
        }
        .level-path-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .level-node {
            position: absolute;
            transform: translate(-50%, -50%);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            z-index: 10;
        }
        .level-node:hover {
            transform: translate(-50%, -50%) scale(1.25);
            z-index: 50;
        }
        .level-marker {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            border: 3px solid #475569;
            color: #94a3b8;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            position: relative;
        }
        .level-node.active .level-marker {
            background: #0ea5e9; /* cyan-500 */
            border-color: #bae6fd;
            color: white;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.6);
            transform: scale(1.1);
        }
        .level-node.future .level-marker {
            border-style: dashed;
            opacity: 0.7;
        }
        .level-node.boss .level-marker {
            width: 60px;
            height: 60px;
            border-color: #e879f9; /* fuchsia-400 */
        }
        .level-node.boss.active .level-marker {
            background: #d946ef;
            box-shadow: 0 0 25px rgba(217, 70, 239, 0.6);
        }
        .level-icon {
            font-size: 20px;
        }
        .level-info {
            position: absolute;
            top: 120%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #475569;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            width: 140px;
            backdrop-filter: blur(4px);
        }
        .level-node:hover .level-info, .level-node.active .level-info {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .level-title {
            color: #e2e8f0;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 2px;
            display: block;
        }
        .level-desc {
            color: #94a3b8;
            font-size: 10px;
            display: block;
        }
    </style>
</head>

        function initSidebar() {
            meetingList.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const btn = document.createElement('button');
                const isLocked = !meetingContent[i] || (i > 1 && meetingContent[i].length === 1 && meetingContent[i][0].content.includes("Soon"));
                btn.className = `w-full text-left p-4 rounded-xl transition-all duration-300 flex items-center gap-3 border ${currentMeeting === i ? 'bg-cyan-500/10 border-cyan-500' : 'bg-slate-800/50 border-transparent hover:bg-slate-800'}`;
                if (isLocked) btn.classList.add('opacity-50', 'cursor-not-allowed');
                else btn.onclick = () => loadMeeting(i);

                btn.innerHTML = `
                    <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold ${currentMeeting === i ? 'bg-cyan-500 text-slate-900' : 'bg-slate-700 text-slate-400'}">${i}</div>
                    <div>
                        <div class="font-bold ${currentMeeting === i ? 'text-cyan-400' : 'text-slate-300'}">Meeting ${i}</div>
                        <div class="text-xs text-slate-500">${i === 1 ? 'Intro' : (i === 2 ? 'Labels' : '...')}</div>
                    </div>
                `;
                meetingList.appendChild(btn);
            }
        }

        function renderSlide() {
            const meetingData = meetingContent[currentMeeting];
            const slideData = meetingData[currentSlide];
            const container = document.getElementById('slideContainer');
            
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                titleEl.textContent = slideData.title;
                subtitleEl.innerHTML = slideData.subtitle || "";
                contentDiv.innerHTML = slideData.content;
                counterEl.textContent = `${String(currentSlide + 1).padStart(2, '0')}/${String(meetingData.length).padStart(2, '0')}`;
                
                const progress = ((currentSlide + 1) / meetingData.length) * 100;
                progressBar.style.width = `${progress}%`;

                document.getElementById('prevBtn').disabled = currentSlide === 0;
                document.getElementById('nextBtn').disabled = currentSlide === meetingData.length - 1;

                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
                
                // Inject Teacher Name, Hobby, Food into Slide if needed
                const introName = document.getElementById('introTeacherName');
                const introHobby = document.getElementById('introTeacherHobby');
                const introFood = document.getElementById('introTeacherFood');
                
                if (introName) {
                    const savedName = localStorage.getItem("teacherName") || "Pengajar";
                    introName.textContent = savedName.startsWith("Kak") ? savedName : "Kak " + savedName;
                }
                if (introHobby) introHobby.textContent = localStorage.getItem("teacherHobby") || "Ngoding";
                if (introFood) introFood.textContent = localStorage.getItem("teacherFood") || "Nasi Goreng";
            }, 300);
        }

        function loadMeeting(id) {
            currentMeeting = id;
            currentSlide = 0;
            initSidebar();
            renderSlide();
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.add('hidden');
        }

        function nextSlide() {
            if (currentSlide < meetingContent[currentMeeting].length - 1) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                currentSlide--;
                renderSlide();
            }
        }

        function checkTeacherName() {
            let teacher = localStorage.getItem("teacherName");
            if (teacher) {
                teacherInputSection.classList.add('hidden');
                welcomeBackSection.classList.remove('hidden');
                displayTeacherName.innerText = teacher;
            } else {
                teacherInputSection.classList.remove('hidden');
                welcomeBackSection.classList.add('hidden');
            }
        }

        window.startClass = function() { // Make global
            const name = document.getElementById('teacherName').value;
            const hobby = document.getElementById('teacherHobby').value;
            const food = document.getElementById('teacherFood').value;
            
            if (name.trim()) {
                localStorage.setItem("teacherName", name);
                localStorage.setItem("teacherHobby", hobby || "Ngoding 💻");
                localStorage.setItem("teacherFood", food || "Nasi Goreng 🍛");
                showMeetingSelection();
            } else {
                alert("Mohon masukkan nama kakak pengajar dulu ya! 😊");

        }

            localStorage.removeItem("teacherHobby");
            localStorage.removeItem("teacherFood");
            document.getElementById('teacherName').value = "";
            document.getElementById('teacherHobby').value = "";
            document.getElementById('teacherFood').value = "";
            checkTeacherName();
        }

        function showMeetingSelection() {
            teacherInputSection.classList.add('hidden');
            welcomeBackSection.classList.add('hidden');
            welcomeMessage.classList.add('hidden');
            meetingSelectionSection.classList.remove('hidden');

            grid.innerHTML = '';
            for (let i = 1; i <= 12; i++) {
                const btn = document.createElement('button');
                const isLocked = !meetingContent[i] || (i > 1 && meetingContent[i].length === 1 && meetingContent[i][0].content.includes("Soon"));
                btn.className = `p-4 rounded-xl border transition-all duration-300 flex flex-col items-center justify-center gap-2 ${!isLocked ? 'bg-slate-800 border-slate-700 hover:bg-slate-700 hover:border-cyan-400 hover:scale-105 cursor-pointer' : 'bg-slate-900/50 border-slate-800 opacity-50 cursor-not-allowed'}`;

                    <span class="text-2xl font-bold ${!isLocked ? 'text-white' : 'text-gray-600'}">Meeting ${i}</span>
                    <span class="text-xs text-center ${!isLocked ? 'text-gray-400' : 'text-gray-700'}">${!isLocked ? 'Klik untuk mulai' : 'Belum tersedia'}</span>
                `;
                if (!isLocked) btn.onclick = () => selectMeeting(i);
                grid.appendChild(btn);
            }
        }

        function selectMeeting(id) {
            currentMeeting = id;
            currentSlide = 0;
            welcomeOverlay.style.opacity = '0';

                welcomeOverlay.style.display = 'none';

                renderSlide();
            }, 1000);

            if (e.key === 'ArrowLeft') prevSlide();
        });

             document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.add('hidden');
        };

        window.startTimer = function(minutes, displayId) {
            let seconds = minutes * 60;
            const display = document.getElementById(displayId);
            if (!display) return;
            
            // Clear existing timer if any (basic implementation)
            if (display.dataset.timerId) clearInterval(parseInt(display.dataset.timerId));
            
            display.classList.remove('text-red-600');
            
            const timerId = setInterval(() => {
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                display.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                
                if (seconds <= 0) {
                    clearInterval(timerId);
                    display.textContent = "WAKTU HABIS!";
                    display.classList.add('text-red-600', 'animate-pulse');
                }
                seconds--;
            }, 1000);
            
            display.dataset.timerId = timerId;
        }
