<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalananti – Placement Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --k-blue: #265E9B;
            --k-blue-d: #1A4576;
            --k-yellow: #F9C013;
            --k-green: #339D9D;
            --bg:  #e8f2ff;
            --bg2: #dbeeff;
            --sky:  #cfe5ff;
            --nebula1: rgba(38,94,155,0.10);
            --nebula2: rgba(249,192,19,0.10);
            --card: rgba(255,255,255,0.92);
            --card-b: rgba(180,215,255,0.85);
            --text: #1a4576;
            --muted: #4d7daf;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background:
                radial-gradient(circle at 10% 10%, var(--nebula1), transparent 36%),
                radial-gradient(circle at 88% 12%, var(--nebula2), transparent 32%),
                radial-gradient(circle at 50% 105%, rgba(51,157,157,0.14), transparent 34%),
                linear-gradient(160deg, var(--bg) 0%, var(--bg2) 50%, var(--sky) 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
            overflow-x: hidden;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed; inset: 0;
            pointer-events: none; z-index: -20;
            opacity: 0.12;
            background-image:
                radial-gradient(circle at 14% 24%, rgba(255,255,255,0.9) 0 1px, transparent 1.6px),
                radial-gradient(circle at 78% 68%, rgba(255,255,255,0.75) 0 1px, transparent 1.5px),
                radial-gradient(circle at 56% 38%, rgba(255,255,255,0.60) 0 1px, transparent 1.4px),
                radial-gradient(circle at 30% 82%, rgba(255,255,255,0.50) 0 1px, transparent 1.3px),
                radial-gradient(circle at 90% 45%, rgba(255,255,255,0.55) 0 1px, transparent 1.4px);
            background-size: 250px 250px, 320px 320px, 210px 210px, 290px 290px, 180px 180px;
            animation: starDrift 200s linear infinite;
        }
        @keyframes starDrift { to { transform: translate3d(-120px, 70px, 0); } }

        .edge-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .edge-planet { position: absolute; pointer-events: none; opacity: 0.55; }
        .edge-left  { left: 0; }
        .edge-right { right: 0; }
        .char-float {
            position: absolute; pointer-events: none; opacity: 0.5;
            filter: drop-shadow(0 12px 24px rgba(0,0,0,0.15));
        }
        @keyframes floatY  { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-18px) rotate(2deg); } }
        @keyframes floatY2 { 0%,100% { transform: translateY(0) rotate(2deg); } 50% { transform: translateY(-14px) rotate(-2deg); } }
        @keyframes twinkle { 0%,100% { opacity:0.4; transform:scale(0.9); } 50% { opacity:1; transform:scale(1.2); } }
        .animate-twinkle { animation: twinkle 3s ease-in-out infinite; }
        .animate-bobble  { animation: bobble 4s ease-in-out infinite; }
        @keyframes bobble { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }

        /* ── Card / Panel ── */
        .glass-panel {
            background: var(--card);
            border: 1.5px solid var(--card-b);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 40px 36px;
            width: 100%;
            max-width: 680px;
            box-shadow: 0 24px 64px -16px rgba(38,94,155,0.18), 0 0 0 4px rgba(255,255,255,0.6);
            position: relative;
            z-index: 10;
        }

        .fade-in { animation: fadeIn 0.45s cubic-bezier(0.175,0.885,0.32,1.275) forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(12px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }

        /* ── Typography ── */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            color: var(--k-blue-d);
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: -0.02em;
        }
        h1 span { color: var(--k-yellow); }
        p.subtitle { color: var(--muted); margin-bottom: 28px; text-align: center; font-size: 1rem; font-weight: 600; }
        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--k-blue-d); margin-bottom: 12px; font-weight: 800; }

        /* ── Form inputs ── */
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: var(--k-blue-d); font-weight: 700; font-size: 0.95rem; letter-spacing: 0.02em; }
        input, select {
            width: 100%; padding: 14px 18px; border-radius: 1rem;
            border: 2px solid rgba(38,94,155,0.22);
            background: rgba(255,255,255,0.8); color: var(--text);
            font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600;
            outline: none; transition: all 0.25s;
        }
        input:focus, select:focus {
            border-color: var(--k-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(38,94,155,0.12);
        }

        /* ── CTA Button (3D yellow) ── */
        button.btn-main {
            background: linear-gradient(180deg, #F9C013 0%, #E5AB00 100%);
            color: #5A3F00;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: none;
            padding: 16px 24px;
            border-radius: 1.2rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 7px 0 #B28400, 0 16px 28px -8px rgba(249,192,19,0.45);
            margin-top: 12px;
        }
        button.btn-main:hover  { transform: translateY(-2px); box-shadow: 0 9px 0 #B28400, 0 20px 36px -8px rgba(249,192,19,0.5); }
        button.btn-main:active { transform: translateY(7px);  box-shadow: 0 0px 0 #B28400, 0 6px 12px -4px rgba(249,192,19,0.3); }

        /* ── Option cards (emoji grid) ── */
        .options-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-bottom: 8px;
        }
        .option-btn {
            background: rgba(255,255,255,0.85);
            border: 2px solid rgba(38,94,155,0.18);
            border-bottom: 5px solid rgba(38,94,155,0.28);
            color: var(--k-blue-d);
            padding: 18px 12px;
            border-radius: 1.2rem;
            cursor: pointer;
            transition: all 0.18s ease;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 130px;
            line-height: 1.35;
            text-align: center;
        }
        .option-btn:hover {
            background: #eff6ff;
            border-color: var(--k-blue);
            border-bottom-color: var(--k-blue-d);
            transform: translateY(-4px);
            box-shadow: 0 10px 24px -8px rgba(38,94,155,0.25);
        }
        .option-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .option-btn .emoji-icon { font-size: 2.6rem; }

        /* ── Progress ── */
        .progress-container { margin-bottom: 28px; }
        .progress-bar { height: 10px; background: rgba(38,94,155,0.1); border-radius: 5px; overflow: hidden; border: 1px solid rgba(38,94,155,0.12); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--k-blue), var(--k-green)); width: 0%; transition: width 0.4s ease-out; }
        .progress-text { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.85rem; color: var(--muted); font-weight: 700; }

        /* ── Question text ── */
        .question-text {
            font-size: 1.25rem;
            margin-bottom: 22px;
            line-height: 1.6;
            font-weight: 700;
            color: var(--k-blue-d);
            background: rgba(38,94,155,0.06);
            border: 1.5px solid rgba(38,94,155,0.12);
            border-radius: 1rem;
            padding: 18px 20px;
        }

        /* ── Pro logic question visuals ── */
        .pro-logic-panel {
            background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(238,247,255,0.92));
            border: 2px solid rgba(38,94,155,0.16);
            border-radius: 18px;
            padding: 18px;
            color: var(--k-blue-d);
        }
        .pro-panel-title {
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
            text-align: left;
        }
        .pro-route-map {
            display: grid;
            grid-template-columns: repeat(5, 48px);
            gap: 8px;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .pro-cell {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            background: #ffffff;
            border: 1.5px solid rgba(38,94,155,0.16);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(38,94,155,0.08);
        }
        .pro-cell.start { background: #dbeafe; color: #1d4ed8; }
        .pro-cell.finish { background: #dcfce7; color: #15803d; }
        .pro-cell.blocked { background: #fee2e2; color: #b91c1c; }
        .pro-code-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        .pro-code-card {
            background: #0f172a;
            border: 1px solid rgba(148,163,184,0.28);
            border-radius: 12px;
            padding: 12px;
            color: #e2e8f0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.82rem;
            line-height: 1.55;
            text-align: left;
        }
        .pro-code-card b { color: #facc15; }
        .pro-rule {
            background: #ffffff;
            border: 1.5px solid rgba(38,94,155,0.14);
            border-left: 5px solid var(--k-blue);
            border-radius: 12px;
            padding: 12px 14px;
            text-align: left;
            font-weight: 700;
            line-height: 1.5;
        }
        .pro-flow {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }
        .pro-flow-step {
            min-width: 92px;
            background: #ffffff;
            border: 1.5px solid rgba(38,94,155,0.15);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            font-weight: 800;
        }
        .pro-flow-step.warning {
            background: #fef3c7;
            border-color: #f59e0b;
            color: #92400e;
        }

        /* ── Badge ── */
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 2rem; font-size: 0.8rem;
            background: rgba(249,192,19,0.15); color: #92600A;
            border: 1.5px solid rgba(249,192,19,0.4);
            margin-bottom: 16px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .badge.hard { background: rgba(239,68,68,0.1); color: #b91c1c; border-color: rgba(239,68,68,0.3); }

        /* ── Result screen ── */
        .result-card {
            background: rgba(255,255,255,0.7);
            border: 1.5px solid rgba(38,94,155,0.15);
            border-radius: 1.2rem;
            padding: 22px 24px;
            margin-bottom: 18px;
            text-align: center;
        }
        .highlight {
            font-family: 'Orbitron', sans-serif;
            color: var(--k-blue-d);
            font-weight: 800;
            font-size: 1.5rem;
            margin: 10px 0;
        }
        .roadmap { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        .roadmap-item {
            background: rgba(255,255,255,0.8);
            border: 2px solid rgba(38,94,155,0.18);
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--k-blue-d);
        }
        .roadmap-item.active {
            background: linear-gradient(135deg, var(--k-blue), var(--k-blue-d));
            color: #fff;
            border-color: var(--k-blue-d);
            box-shadow: 0 6px 0 #0d2542, 0 12px 20px -8px rgba(38,94,155,0.5);
        }
        .roadmap-arrow { color: var(--muted); font-size: 1rem; }

        /* ── Unified Mode UI (Dulu Kids Mode) ── */
        .option-btn {
            min-height: 150px;
            font-size: 1.1rem;
            border-radius: 1.5rem;
        }
        .option-btn .emoji-icon {
            font-size: 3.2rem;
        }

        /* ── Loader ── */
        #pt-loader {
            position: fixed; inset: 0; background: #dbeeff;
            z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.7s ease, visibility 0.7s;
        }
        #pt-loader.loaded { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-rocket { width: 110px; animation: loaderFloat 2.5s ease-in-out infinite; filter: drop-shadow(0 0 20px rgba(249,192,19,0.4)); }
        @keyframes loaderFloat { 0%,100% { transform:translateY(0) rotate(-6deg); } 50% { transform:translateY(-28px) rotate(6deg); } }
        .loader-bar { width: 240px; height: 8px; background: rgba(38,94,155,0.1); border-radius: 4px; margin-top: 36px; overflow: hidden; border: 1px solid rgba(38,94,155,0.15); }
        .loader-progress { height: 100%; background: linear-gradient(90deg, var(--k-blue), var(--k-yellow)); animation: loaderFill 1.6s cubic-bezier(0.65,0,0.35,1) forwards; }
        @keyframes loaderFill { 0% { width:0%; } 100% { width:100%; } }

        /* ── Drag & Drop (Pilar 2) ── */
        .pt1-dnd-wrap { display: flex; flex-direction: column; gap: 16px; }
        .pt1-dnd-guide {
            display: flex; align-items: center; gap: 12px;
            background: rgba(38,94,155,0.06); border: 1.5px solid rgba(38,94,155,0.14);
            border-radius: 14px; padding: 12px 16px; font-size: 0.88rem;
            font-weight: 700; color: var(--muted);
        }
        .pt1-dnd-guide span { font-size: 1.4rem; }
        .pt1-pool {
            display: flex; flex-wrap: wrap; gap: 10px;
            background: rgba(38,94,155,0.04); border: 2px dashed rgba(38,94,155,0.2);
            border-radius: 16px; padding: 14px; min-height: 64px; align-items: center;
        }
        .pt1-card {
            background: #fff; border: 2.5px solid rgba(38,94,155,0.22);
            border-bottom: 5px solid rgba(38,94,155,0.32);
            border-radius: 14px; padding: 10px 16px; cursor: grab;
            font-size: 1.05rem; font-weight: 800; color: var(--k-blue-d);
            display: flex; align-items: center; gap: 10px;
            transition: all .15s; user-select: none;
        }
        .pt1-card:active { cursor: grabbing; border-bottom-width: 2px; transform: translateY(3px); }
        .pt1-card.pt1-dragging { opacity: 0.35; border-style: dashed; }
        .pt1-card.pt1-placed { opacity: 0.3; pointer-events: none; border-style: dashed; background: #f1f5f9; }
        .pt1-card-icon { font-size: 1.8rem; }

        .pt1-slots { display: flex; flex-direction: column; gap: 10px; }
        .pt1-slots.pt1-slots-horizontal {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .pt1-slot {
            background: #fff; border: 2.5px dashed rgba(38,94,155,0.25);
            border-radius: 14px; padding: 10px 14px; min-height: 58px;
            display: flex; align-items: center; gap: 10px; transition: all .2s;
        }
        .pt1-slots-horizontal .pt1-slot {
            position: relative;
            flex-direction: column;
            width: 120px;
            min-height: 140px;
            padding: 12px 10px;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .pt1-slot.pt1-dragover { border-color: var(--k-blue); background: rgba(38,94,155,0.08); transform: scale(1.01); }
        .pt1-slot.pt1-filled { border-style: solid; border-color: var(--k-blue); background: rgba(38,94,155,0.06); }
        .pt1-slots-horizontal .pt1-slot.pt1-filled {
            justify-content: flex-start;
            padding-top: 25px; /* Leave space for badge/remove btn */
        }
        .pt1-slot-num {
            width: 30px; height: 30px; border-radius: 8px; background: rgba(38,94,155,0.1);
            color: var(--k-blue-d); font-weight: 900; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .pt1-slots-horizontal .pt1-slot-num {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 22px;
            height: 22px;
            font-size: 0.75rem;
            border-radius: 6px;
            z-index: 10;
        }
        .pt1-slot.pt1-filled .pt1-slot-num { background: var(--k-blue); color: #fff; }
        .pt1-slot-content { font-size: 0.95rem; font-weight: 800; color: var(--k-blue-d); flex: 1; }
        .pt1-slots-horizontal .pt1-slot-content {
            margin-top: 10px;
        }
        .pt1-slot-hint { font-size: 0.85rem; color: #94a3b8; font-style: italic; font-weight: 600; }
        .pt1-slots-horizontal .pt1-slot-hint {
            font-size: 0.78rem;
            line-height: 1.3;
            margin-top: 15px; /* visual balancing with badge */
        }
        .pt1-slot-remove { font-size: 0.9rem; cursor: pointer; color: #ef4444; background: none; border: none; font-weight: 900; padding: 2px 6px; border-radius: 6px; }
        .pt1-slots-horizontal .pt1-slot-remove {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            font-size: 0.75rem;
            border-radius: 6px;
            z-index: 10;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .pt1-slots-horizontal .pt1-slot-remove:hover {
            background: #ef4444;
            color: white;
        }
        .pt1-dnd-submit {
            background: linear-gradient(180deg, #F9C013 0%, #E5AB00 100%);
            color: #5A3F00; font-family: 'Orbitron', sans-serif; font-weight: 800;
            font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase;
            border: none; padding: 14px 24px; border-radius: 1rem; cursor: pointer;
            transition: all 0.15s ease; box-shadow: 0 6px 0 #B28400;
            margin-top: 4px; width: 100%;
        }
        .pt1-dnd-submit:disabled { opacity: 0.45; cursor: not-allowed; }
        .pt1-dnd-submit:not(:disabled):hover { transform: translateY(-2px); box-shadow: 0 8px 0 #B28400; }
        .pt1-dnd-submit:not(:disabled):active { transform: translateY(6px); box-shadow: 0 0 0 #B28400; }
        .pt1-dnd-reset {
            background: transparent; color: var(--muted); border: 1.5px solid rgba(38,94,155,0.2);
            border-radius: 10px; padding: 10px 18px; font-size: 0.85rem; font-weight: 800;
            cursor: pointer; transition: all 0.15s; width: 100%; margin-top: 6px;
        }
        .pt1-dnd-reset:hover { background: rgba(38,94,155,0.06); }
        
        /* ── Layout Grouping (Q10 Custom) ── */
        .lg-cat-box {
            background: #fff; border: 2.5px dashed rgba(38,94,155,0.22);
            border-radius: 18px; padding: 16px; min-height: 140px;
            display: flex; flex-direction: column; gap: 10px; transition: all 0.2s ease;
        }
        .lg-cat-box.pt1-dragover {
            border-color: var(--k-blue) !important;
            background: rgba(38,94,155,0.06) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(38,94,155,0.08);
        }
    </style>
</head>
<body>



    <!-- Developer Menu (Floating Panel) -->
    <div id="dev-panel" style="position:fixed; bottom:20px; right:20px; background:rgba(0,0,0,0.85); color:white; padding:16px; border-radius:12px; font-family:'Space Grotesk', sans-serif; z-index:9999; display:flex; flex-direction:column; gap:10px; border:1px solid #334155; font-size:13px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); backdrop-filter: blur(8px);">
        <div style="font-weight:800; color:#38bdf8; text-align:center; margin-bottom:4px; font-family:'Orbitron', sans-serif; letter-spacing:1px;"><i class="fa-solid fa-code"></i> DEV MODE</div>
        <div style="display:flex; gap:8px; justify-content:center;">
            <button onclick="devPrev()" style="flex:1; padding:8px 12px; cursor:pointer; background:#334155; color:white; border:none; border-radius:6px; font-weight:bold; transition:all 0.2s;" onmouseover="this.style.background='#475569'" onmouseout="this.style.background='#334155'"><i class="fa-solid fa-arrow-left"></i> Prev</button>
            <button onclick="devNext()" style="flex:1; padding:8px 12px; cursor:pointer; background:#334155; color:white; border:none; border-radius:6px; font-weight:bold; transition:all 0.2s;" onmouseover="this.style.background='#475569'" onmouseout="this.style.background='#334155'">Next <i class="fa-solid fa-arrow-right"></i></button>
        </div>
        <button onclick="devToggleAge()" style="padding:8px; cursor:pointer; background:linear-gradient(135deg, #2563eb, #1d4ed8); color:white; border:none; border-radius:6px; font-weight:bold; margin-top:4px;">

        // ── Drag & Drop handlers (Pilar Kreativitas) ────────────────────────
        window.pt1DndStart = function(e, id) {
            window._pt1DraggingId = id;
            e.dataTransfer.setData('text/plain', id);
            setTimeout(() => {
                const el = document.querySelector(`.pt1-card[data-id="${id}"]`);
                if (el) el.classList.add('pt1-dragging');
            }, 0);
        };
        window.pt1DndOver = function(e) {
            e.preventDefault();
            e.currentTarget.classList.add('pt1-dragover');
        };
        window.pt1DndLeave = function(e) {
            e.currentTarget.classList.remove('pt1-dragover');
        };
        window.pt1DndDrop = function(e, slotIdx) {
            e.preventDefault();
            e.currentTarget.classList.remove('pt1-dragover');
            const id = e.dataTransfer.getData('text/plain') || window._pt1DraggingId;
            if (!id) return;
            // If slot already filled, swap back to pool (clear slot)
            const dnd = window._pt1Dnd;
            if (dnd.slots[slotIdx] !== null) {
                // no double-fill; ignore
                return;
            }
            dnd.slots[slotIdx] = id;
            render();
        };
        window.pt1DndRemove = function(slotIdx) {
            if (!window._pt1Dnd) return;
            window._pt1Dnd.slots[slotIdx] = null;
            render();
        };
        window.pt1DndCanvasDrop = function(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('pt1-dragover');
            const id = e.dataTransfer.getData('text/plain') || window._pt1DraggingId;
            if (!id) return;
            const dnd = window._pt1Dnd;
            const emptyIdx = dnd.slots.indexOf(null);
            if (emptyIdx > -1) {
                // If it's already in another slot, clear it (should not happen in canvas stack usually)
                const oldSlot = dnd.slots.indexOf(id);
                if (oldSlot > -1) dnd.slots[oldSlot] = null;
                dnd.slots[emptyIdx] = id;
                render();
            }
        };
        window.pt1DndCanvasUndo = function(e) {
            if (e) { e.preventDefault(); e.stopPropagation(); }
            if (!window._pt1Dnd) return;
            const dnd = window._pt1Dnd;
            for (let i = dnd.slots.length - 1; i >= 0; i--) {
                if (dnd.slots[i] !== null) {
                    dnd.slots[i] = null;
                    break;
                }
            }
            render();
        };
        window.pt1DndReset = function() {
            if (!window._pt1Dnd) return;
            window._pt1Dnd.slots = window._pt1Dnd.slots.map(() => null);
            render();
        };
        window.pt1DndSubmit = function() {
            const q = stage1Questions[state.currentQuestionIndex];
            const dnd = window._pt1Dnd;
            if (!dnd || dnd.slots.some(s => s === null)) return;
            const correctOrder = q.correctOrder[state.ageGroup];
            const isCorrect = dnd.slots.every((id, i) => id === correctOrder[i]);
            if (isCorrect) state.scores[q.pillar]++;
            window._pt1Dnd = null; // reset for next dnd question
            const prevPillar = q.pillar;
            state.currentQuestionIndex++;
            if (state.currentQuestionIndex >= stage1Questions.length) {
                prepareStage1Advanced();
                state.currentStage = state.stage1AdvancedQueue.length > 0 ? 2 : 4;
                if (state.currentStage === 4) determineModule();
                state.currentQuestionIndex = 0;
            } else {
                const nextPillar = stage1Questions[state.currentQuestionIndex].pillar;
                if (prevPillar !== nextPillar) state.showingPillarIntro = true;
            }
            render();
        };

        window.initSlidePuzzle = function() {
            const board = document.getElementById('slide-puzzle-board');
            if (!board) return;
            
            // clear existing blocks except the door
            Array.from(board.children).forEach(child => {
                if (!child.id || !child.id.startsWith('sp-door')) {
                    board.removeChild(child);
                }
            });
            
            const sp = window._pt1SlidePuzzle;
            const CELL_SIZE = 55; // 4x4 grid -> 220x220 board
            
            sp.blocks.forEach((block) => {
                const el = document.createElement('div');
                el.style.position = 'absolute';
                el.style.left = (block.c * CELL_SIZE) + 'px';
                el.style.top = (block.r * CELL_SIZE) + 'px';
                el.style.width = (block.type === 'h' ? block.length * CELL_SIZE : CELL_SIZE) + 'px';
                el.style.height = (block.type === 'v' ? block.length * CELL_SIZE : CELL_SIZE) + 'px';
                el.style.backgroundColor = block.color;
                el.style.borderRadius = '8px';
                el.style.border = '2px solid rgba(0,0,0,0.2)';
                el.style.display = 'flex';
                el.style.alignItems = 'center';
                el.style.justifyContent = 'center';
                el.style.color = '#fff';
                el.style.fontWeight = '900';
                el.style.fontSize = '16px';
                el.style.cursor = 'grab';
                el.style.userSelect = 'none';
                el.style.boxSizing = 'border-box';
                el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.2)';
                el.style.zIndex = 10;
                
                if (block.image) {
                    el.style.backgroundColor = 'transparent';
                    el.style.border = 'none';
                    el.style.boxShadow = 'none';
                    el.innerHTML = `<img src="${block.image}" style="width:100%; height:100%; object-fit:contain; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.3)); pointer-events:none;">`;
                } else {
                    el.innerHTML = block.text;
                }

                // Interaction logic
                let isDragging = false;
                let startX, startY;
                let startPos;
                
                const onStart = (e) => {
                    if (e.button === 2) return;
                    isDragging = true;
                    el.style.cursor = 'grabbing';
                    el.style.zIndex = 20;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    startX = clientX;
                    startY = clientY;
                    startPos = block.type === 'h' ? block.c : block.r;
                };
                
                const onMove = (e) => {
                    if (!isDragging) return;
                    e.preventDefault(); // prevent scrolling
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    
                    let delta = block.type === 'h' ? (clientX - startX) : (clientY - startY);
                    let cellsMoved = Math.round(delta / CELL_SIZE);
                    let newPos = startPos + cellsMoved;
                    
                    // Boundary check
                    if (newPos < 0) newPos = 0;
                    if (newPos + block.length > sp.gridSize) newPos = sp.gridSize - block.length;
                    
                    let endPos = startPos;
                    if (newPos !== startPos) {
                        let moveDir = newPos > startPos ? 1 : -1;
                        for (let step = startPos + moveDir; ; step += moveDir) {
                            let collision = false;
                            for (let other of sp.blocks) {
                                if (other.id === block.id) continue;
                                
                                let b1 = { ...block };
                                if (block.type === 'h') b1.c = step;
                                else b1.r = step;
                                
                                let overlapX = b1.c < other.c + (other.type==='h'?other.length:1) && b1.c + (b1.type==='h'?b1.length:1) > other.c;
                                let overlapY = b1.r < other.r + (other.type==='v'?other.length:1) && b1.r + (b1.type==='v'?b1.length:1) > other.r;
                                
                                if (overlapX && overlapY) {
                                    collision = true;
                                    break;
                                }
                            }
                            if (collision) break;
                            endPos = step;
                            if (step === newPos) break;
                        }
                    }
                    
                    if (block.type === 'h') block.c = endPos;
                    else block.r = endPos;
                    
                    el.style.left = (block.c * CELL_SIZE) + 'px';
                    el.style.top = (block.r * CELL_SIZE) + 'px';
                    
                    checkWinCondition();
                };
                
                const onEnd = () => {
                    if (!isDragging) return;
                    isDragging = false;
                    el.style.cursor = 'grab';
                    el.style.zIndex = 10;
                    el.style.left = (block.c * CELL_SIZE) + 'px';
                    el.style.top = (block.r * CELL_SIZE) + 'px';
                    startX = null;
                    startY = null;
                };
                
                el.addEventListener('mousedown', onStart);
                document.addEventListener('mousemove', onMove, {passive: false});
                document.addEventListener('mouseup', onEnd);
                
                el.addEventListener('touchstart', onStart, {passive: false});
                document.addEventListener('touchmove', onMove, {passive: false});
                document.addEventListener('touchend', onEnd);
                
                board.appendChild(el);
            });

                    document.getElementById('sp-submit-btn').style.boxShadow = '0 6px 0 #B28400';

        function hexToRgb(hex) {
            const bigint = parseInt(hex.slice(1), 16);
            return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
        }
        
        function adjustBrightness(rgb, brightnessLevel) {
            let [r, g, b] = rgb;
            if (brightnessLevel < 50) {
                const factor = brightnessLevel / 50;
                r *= factor; g *= factor; b *= factor;
            } else if (brightnessLevel > 50) {
                const factor = (brightnessLevel - 50) / 50;
                r += (255 - r) * factor;
                g += (255 - g) * factor;
                b += (255 - b) * factor;
            }
            return [Math.round(r), Math.round(g), Math.round(b)];
        }
        
        function getLuminance(r, g, b) {
            const a = [r, g, b].map(function (v) {
                v /= 255;
                return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }
        
        function getContrastRatio(l1, l2) {
            const lightest = Math.max(l1, l2);
            const darkest = Math.min(l1, l2);
            return (lightest + 0.05) / (darkest + 0.05);
        }

            const baseRgb = hexToRgb(hex);

        window.submitColorContrast = function() {
            const picker = document.getElementById('cc-color-picker');
            const slider = document.getElementById('cc-brightness');
            if (!picker || !slider) return;
            
            // bg is dark blue: #0f172a (15, 23, 42)
            const bgL = getLuminance(15, 23, 42); 
            const hex = picker.value;
            const brightness = parseInt(slider.value);
            const helperActive = window._ccHelperActive;
            
            const baseRgb = hexToRgb(hex);
            const finalRgb = adjustBrightness(baseRgb, brightness);
            const fgL = getLuminance(finalRgb[0], finalRgb[1], finalRgb[2]);
            const ratio = getContrastRatio(bgL, fgL);
            
            let score = 0;
            let feedback = "";
            if (ratio < 2) {
                score = 1;
                feedback = "Tulisan masih sulit dibaca karena warnanya terlalu mirip dengan background.";
            } else if (ratio < 3) {
                score = 2;
                feedback = "Sudah mulai terlihat, tapi masih bisa dibuat lebih jelas.";
            } else if (ratio < 4.5) {
                score = 3;
                feedback = "Cukup terbaca, tapi masih bisa ditingkatkan.";
            } else if (ratio < 7) {
                score = 4;
                feedback = "Bagus! Tulisan sudah jelas dan nyaman dibaca.";
            } else {
                score = 4;
                feedback = "Keren! Tulisan sangat mudah dibaca karena kontrasnya kuat.";
            }
            
            if (helperActive && ratio >= 4.5) {
                score = 5;
                feedback = "Sempurna! Tulisan sangat jelas karena kontras kuat dan kamu memakai efek tambahan background.";
            }

            nextQuestionAfterColorContrast(score);

        let q3SocketMoveTimer = null;
        function stopQ3CableMotion(){

        }
        function startQ3SocketMotion(){
            stopQ3CableMotion();
            const socket = document.getElementById('socket-red');
            if(!socket) return;
            const positions = ['18%', '52%', '34%'];
            let i = 0;

        function initCableDrag(){
            const plug = document.getElementById('plug-red');
            const socket = document.getElementById('socket-red');
            const arena = document.getElementById('cable-arena');
            const svg = document.getElementById('cable-svg');
            if(!plug || !socket || !arena) return;
            let dragging = false;
            let line = null;

            plug.addEventListener('mousedown', function(e){
                dragging = true;
                plug.style.cursor = 'grabbing';
                line = document.createElementNS('http://www.w3.org/2000/svg','line');
                line.setAttribute('stroke','#ef4444');
                line.setAttribute('stroke-width','6');
                line.setAttribute('stroke-linecap','round');
                line.setAttribute('stroke-dasharray','12 8');
                const px = ((plug.offsetLeft + plug.offsetWidth / 2) / arena.offsetWidth) * 100;
                const py = ((plug.offsetTop + plug.offsetHeight / 2) / arena.offsetHeight) * 100;
                line.setAttribute('x1', px + '%'); line.setAttribute('y1', py + '%');
                line.setAttribute('x2', px + '%'); line.setAttribute('y2', py + '%');
                svg.appendChild(line);
                e.preventDefault();
            });
            document.addEventListener('mousemove', function(e){
                if(!dragging || !line) return;
                const r = arena.getBoundingClientRect();
                const mx = ((e.clientX - r.left) / r.width) * 100;
                const my = ((e.clientY - r.top) / r.height) * 100;
                line.setAttribute('x2', mx + '%');
                line.setAttribute('y2', my + '%');
                const sr = socket.getBoundingClientRect();
                const near = Math.abs(e.clientX - (sr.left + sr.width/2)) < 65 && Math.abs(e.clientY - (sr.top + sr.height/2)) < 65;
                line.setAttribute('stroke', near ? '#22c55e' : '#ef4444');
            });
            document.addEventListener('mouseup', function(e){
                if(!dragging) return;
                dragging = false;
                plug.style.cursor = 'grab';
                const sr = socket.getBoundingClientRect();
                if(Math.abs(e.clientX - (sr.left + sr.width/2)) < 70 && Math.abs(e.clientY - (sr.top + sr.height/2)) < 70){
                    stopQ3CableMotion();
                    answerStage1(0);
                } else {
                    if(svg && line && line.parentNode) svg.removeChild(line);
                    line = null;
                }
            });
            plug.addEventListener('touchstart', function(e){
                dragging = true;
                line = document.createElementNS('http://www.w3.org/2000/svg','line');
                line.setAttribute('stroke','#ef4444');
                line.setAttribute('stroke-width','6');
                line.setAttribute('stroke-linecap','round');
                line.setAttribute('stroke-dasharray','12 8');
                const px = ((plug.offsetLeft + plug.offsetWidth / 2) / arena.offsetWidth) * 100;
                const py = ((plug.offsetTop + plug.offsetHeight / 2) / arena.offsetHeight) * 100;
                line.setAttribute('x1', px + '%'); line.setAttribute('y1', py + '%');
                line.setAttribute('x2', px + '%'); line.setAttribute('y2', py + '%');
                svg.appendChild(line);
                e.preventDefault();
            }, {passive: false});
            document.addEventListener('touchmove', function(e){
                if(!dragging || !line) return;
                const touch = e.touches[0];
                const r = arena.getBoundingClientRect();
                const mx = ((touch.clientX - r.left) / r.width) * 100;
                const my = ((touch.clientY - r.top) / r.height) * 100;
                line.setAttribute('x2', mx + '%');
                line.setAttribute('y2', my + '%');
                const sr = socket.getBoundingClientRect();
                const near = Math.abs(touch.clientX - (sr.left + sr.width/2)) < 65 && Math.abs(touch.clientY - (sr.top + sr.height/2)) < 65;
                line.setAttribute('stroke', near ? '#22c55e' : '#ef4444');
                e.preventDefault();
            }, {passive: false});
            document.addEventListener('touchend', function(e){
                if(!dragging) return;
                dragging = false;
                const touch = e.changedTouches[0];
                const sr = socket.getBoundingClientRect();
                if(Math.abs(touch.clientX - (sr.left + sr.width/2)) < 70 && Math.abs(touch.clientY - (sr.top + sr.height/2)) < 70){
                    stopQ3CableMotion();
                    answerStage1(0);
                } else {
                    if(svg && line && line.parentNode) svg.removeChild(line);
                    line = null;
                }
            });
        }

        function checkInteractiveLogin() {
            const u = document.getElementById('q5user').value;
            const p = document.getElementById('q5pass').value;
            const uOk = u === 'Petualang99';
            const pOk = p === 'Sk0l@h_Asyik!';
            const ub = document.getElementById('login-user-badge');
            const pb = document.getElementById('login-pass-badge');
            if (ub) {
                if(u) ub.innerHTML = uOk ? '<span style="color:#22c55e;font-size:14px;font-weight:900;">&#10003; Benar!</span>' : '<span style="color:#ef4444;font-size:14px;font-weight:900;">&#10007; Salah</span>';
                else ub.innerHTML = '';
            }
            if (pb) {
                if(p) pb.innerHTML = pOk ? '<span style="color:#22c55e;font-size:14px;font-weight:900;">&#10003; Benar!</span>' : '<span style="color:#ef4444;font-size:14px;font-weight:900;">&#10007; Salah</span>';
                else pb.innerHTML = '';
            }
            const uEl = document.getElementById('q5user');
            const pEl = document.getElementById('q5pass');
            if (uEl) uEl.style.borderColor = u ? (uOk ? '#22c55e' : '#ef4444') : '#475569';
            if (pEl) pEl.style.borderColor = p ? (pOk ? '#22c55e' : '#ef4444') : '#475569';
            if (uOk && pOk) {
                if (window._loginTimerInterval) {
                    clearInterval(window._loginTimerInterval);
                    window._loginTimerInterval = null;
                }
                setTimeout(() => answerStage1(0), 400);
            }
        }

        function checkInteractiveSearch() {
            const val = document.getElementById('qSearchBox').value.toLowerCase();
            const res = document.getElementById('qSearchResults');
            if (val.length >= 2) {
                res.style.display = 'block';
            } else {
                res.style.display = 'none';
            }
        }

        // Login question: auto-skip after 2 minutes
        function startLoginTimer() {
            if (window._loginTimerInterval) {
                clearInterval(window._loginTimerInterval);
                window._loginTimerInterval = null;
            }
            const TOTAL = 120; // 2 minutes in seconds
            let remaining = TOTAL;

            window._loginTimerInterval = setInterval(() => {
                remaining--;
                const el = document.getElementById('login-countdown');
                const fill = document.getElementById('login-timer-fill');
                if (!el || !fill) {
                    clearInterval(window._loginTimerInterval);
                    window._loginTimerInterval = null;
                    return;
                }
                const pct = (remaining / TOTAL) * 100;
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                el.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
                fill.style.width = pct + '%';

                // Change color as time runs out
                if (remaining <= 30) {
                    el.style.color = '#ef4444';
                    fill.style.background = '#ef4444';
                } else if (remaining <= 60) {
                    el.style.color = '#f59e0b';
                    fill.style.background = '#f59e0b';
                }

                if (remaining <= 0) {
                    clearInterval(window._loginTimerInterval);
                    window._loginTimerInterval = null;
                    // Show timeout flash
                    const bar = document.getElementById('login-timer-bar');
                    if (bar) {
                        bar.style.background = '#fee2e2';
                        bar.style.borderColor = '#fca5a5';
                        bar.innerHTML = '<i class="fa-solid fa-clock" style="color:#ef4444;font-size:18px;"></i> <span style="font-weight:900;color:#ef4444;font-size:15px;">Waktu habis! Otomatis dilanjutkan...</span>';
                    }
                    setTimeout(() => {
                        // Answer with index 999 (will be wrong = score 0)
                        answerStage1(999);
                    }, 1000);
                }
            }, 1000);
        }

        // File sort game click handlers (soal 20)
        function fileSortSelect(index) {
            const fs = window._fileSort;
            if (!fs || fs.results[index] !== undefined) return;
            fs.selected = index;
            render();
        }

        function fileSortDrop(folderId) {
            const fs = window._fileSort;
            if (!fs || fs.selected === null) return;
            fs.results[fs.selected] = folderId;
            fs.selected = null;
            render();
        }

        function fileSortSubmit() {
            const fs = window._fileSort;
            if (!fs) return;
            const FILES = [
                { name: 'liburan.jpg',     folder: 'foto' },
                { name: 'tugas.docx',      folder: 'dokumen' },
                { name: 'lagu_favorit.mp3',folder: 'musik' },
                { name: 'setup_game.exe',  folder: 'app' },
                { name: 'foto_ultah.png',  folder: 'foto' },
                { name: 'laporan.pdf',     folder: 'dokumen' },
                { name: 'podcast.mp3',     folder: 'musik' },
                { name: 'antivirus.exe',   folder: 'app' }
            ];
            let correct = 0;
            for (const [idx, fId] of Object.entries(fs.results)) {
                if (FILES[idx].folder === fId) correct++;
            }
            
            if (correct >= 6) {
                // Pass -> correct index is 0
                answerStage1(0);
            } else {
                // Fail -> reset and try again
                window._fileSort.results = {};
                window._fileSort.selected = null;
                render();
            }
        }

        window.fileSortDragStart = function(event, index) {
            const fs = window._fileSort;
            if (!fs || fs.results[index] !== undefined) return;
            event.dataTransfer.setData('text/plain', index);
            event.dataTransfer.effectAllowed = 'move';
        };

        window.fileSortDragOver = function(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
        };

        window.fileSortDropEvent = function(event, folderId) {
            event.preventDefault();
            const index = event.dataTransfer.getData('text/plain');
            if (index === null || index === '') return;
            
            const fs = window._fileSort;
            if (!fs || fs.results[index] !== undefined) return;

            fs.results[index] = folderId;
            fs.selected = null;
            render();
        };

        window.logicSeqDragStart = function(event, itemId, fromSlotIdx = null) {
            event.dataTransfer.setData('text/plain', JSON.stringify({ itemId, fromSlotIdx }));
            event.dataTransfer.effectAllowed = 'move';
        };

        window.logicSeqDragOver = function(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
        };

        window.logicSeqDropEvent = function(event, toSlotIdx) {
            event.preventDefault();
            const dataStr = event.dataTransfer.getData('text/plain');
            if (!dataStr) return;
            const data = JSON.parse(dataStr);
            const ls = window._logicSeq;
            if (!ls) return;

            // If it came from another slot, swap or clear the old slot
            if (data.fromSlotIdx !== null && data.fromSlotIdx !== undefined) {
                ls.slots[data.fromSlotIdx] = ls.slots[toSlotIdx];
            }
            ls.slots[toSlotIdx] = data.itemId;
            
            const filledSlots = ls.slots.filter(s => s !== null).length;
            if (filledSlots === 5) {
                setTimeout(() => window.logicSeqSubmit(), 300);
            }
            
            render();
        };

        window.logicSeqRemove = function(slotIdx) {
            const ls = window._logicSeq;
            if (!ls) return;
            ls.slots[slotIdx] = null;
            render();
        };

        window.logicSeqSubmit = function() {
            const ls = window._logicSeq;
            if (!ls) return;
            const CORRECT_SEQUENCE = ['c1', 'c2', 'c3', 'c4', 'c5'];
            let isCorrect = true;
            for (let i = 0; i < 5; i++) {
                if (ls.slots[i] !== CORRECT_SEQUENCE[i]) {
                    isCorrect = false;
                    break;
                }
            }

            if (isCorrect) {
                window.answerStage1Advanced(0);
            } else {
                window.answerStage1Advanced(null);
            }
        };

        window.flowerGridToggle = function(idx) {
            const fg = window._flowerGrid;
            if (!fg) return;
            fg.grid[idx] = !fg.grid[idx];
            render();
        };

        window.flowerGridSubmit = function() {
            const fg = window._flowerGrid;
            if (!fg) return;
            // Correct answer: Ulangi 2 kali (2 baris), Ulangi 3 kali (3 bunga per baris)
            const correctIndices = [0, 1, 2, 4, 5, 6];
            let isCorrect = true;
            for (let i = 0; i < 16; i++) {
                const expected = correctIndices.includes(i);
                if (fg.grid[i] !== expected) {
                    isCorrect = false;
                    break;
                }
            }

            if (isCorrect) {
                window.answerStage1Advanced(0); // Pass index 0 (which is treated as correct internally)
            } else {
                window.answerStage1Advanced(null); // Incorrect
            }
        };

        // Initialize App

        render();
    </script>
