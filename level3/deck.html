    <style>

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* slate-50 */
            color: #1e293b; /* slate-800 */
        }
        
        /* Limitless Learning Theme Gradients */
        .header-gradient {
            background: linear-gradient(135deg, #16a34a 0%, #2563eb 100%); /* green-600 to blue-600 */
        }
        
        .slide-transition {
            transition: all 0.3s ease-in-out;
        }
        
        .meeting-tab {
            transition: all 0.2s ease;
        }
        
        .meeting-tab:hover {
            transform: translateY(-2px);
        }
        
        .code-font {
            font-family: 'Courier New', monospace;
        }
        
        /* Latar belakang slide utama dengan visual bersih & modern */
        .code-bg {
            background: #ffffff;
            position: relative;
            overflow: hidden;
            border: 1px solid #e2e8f0; /* slate-200 */
        }
        
        /* Dekorasi background slide */
        .code-bg::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .code-bg::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(22,163,74,0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        
        /* Background Pattern untuk area utama */
        .main-pattern {
            background-color: #f1f5f9; /* slate-100 */
            background-image: 
                linear-gradient(#e2e8f0 1px, transparent 1px),
                linear-gradient(90deg, #e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Marker list kustom */
        .custom-list li {
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;
        }
        .custom-list li::marker {
            color: #16a34a; /* green-600 */
            font-weight: bold;
        }

        /* Floating Elements Animation */
        .floating-element {
            position: absolute;
            animation: float 6s ease-in-out infinite;
            opacity: 0.6;
            z-index: 0;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* Custom Scrollbar for Sidebar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar-scroll::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        .sidebar-scroll::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 3px;
        }
    
#welcomeOverlay {
            position: fixed;
            inset: 0;
            background-color: #f1f5f9;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out;
        }
.fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
.delay-500ms { animation-delay: 0.5s; }
.bounce-slow { animation: bounce 2s infinite; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}
/* --- VISUAL ELEVATION: Realistic Window Mocks --- */

        .mock-window {
            background: #e2e8f0; /* bg-slate-200 */
            border-radius: 8px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif; /* Windows-like font */
            border: 1px solid #94a3b8;
        }
        .mock-window-header {
            background: #f1f5f9;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #cbd5e1;
        }
        .mock-window-title {
            font-size: 12px;
            color: #334155;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mock-window-controls {
            display: flex;
            gap: 6px;
        }
        .win-btn { width: 10px; height: 10px; border-radius: 50%; }
        .win-close { background: #ef4444; }
        .win-min { background: #eab308; }
        .win-max { background: #22c55e; }
        
        .mock-window-content {
            background: white;
            padding: 16px;
            color: #1e293b;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        
</style>

    <script>
        // --- Configuration ---
        const totalMeetings = 12;
        let currentMeeting = 1;
        let currentSlide = 1;

        // --- Data Structure ---

        // --- Welcome Logic from Level 3 ---
        const welcomeMessage = document.getElementById('welcomeMessage');
        const meetingSelectionSection = document.getElementById('meetingSelectionSection');
        const welcomeOverlay = document.getElementById('welcomeOverlay');
        const displayTeacherName = document.getElementById('displayTeacherName');
        const teacherInputSection = document.getElementById('teacherInputSection');
        const welcomeBackSection = document.getElementById('welcomeBackSection');

        function checkTeacherName() {
            let teacher = localStorage.getItem("teacherName");
            if (teacher) {
                if(teacherInputSection) teacherInputSection.classList.add('hidden');
                if(welcomeBackSection) welcomeBackSection.classList.remove('hidden');
                if(displayTeacherName) displayTeacherName.innerText = teacher;
            } else {
                if(teacherInputSection) teacherInputSection.classList.remove('hidden');
                if(welcomeBackSection) welcomeBackSection.classList.add('hidden');
            }
        }

        window.startClass = function() {
            const name = document.getElementById('teacherName') ? document.getElementById('teacherName').value : '';
            const hobby = document.getElementById('teacherHobby') ? document.getElementById('teacherHobby').value : '';
            const food = document.getElementById('teacherFood') ? document.getElementById('teacherFood').value : '';
            
            if (name.trim()) {
                localStorage.setItem("teacherName", name);
                localStorage.setItem("teacherHobby", hobby || "Ngoding 💻");
                localStorage.setItem("teacherFood", food || "Nasi Goreng 🍛");
                showMeetingSelection();
            } else {
                alert("Mohon masukkan nama kakak pengajar dulu ya! 😊");
            }
        }

        window.enterClass = function() { showMeetingSelection(); }

        window.resetTeacher = function() {
            localStorage.removeItem("teacherName");
            localStorage.removeItem("teacherHobby");
            localStorage.removeItem("teacherFood");
            if(document.getElementById('teacherName')) document.getElementById('teacherName').value = "";
            if(document.getElementById('teacherHobby')) document.getElementById('teacherHobby').value = "";
            if(document.getElementById('teacherFood')) document.getElementById('teacherFood').value = "";
            checkTeacherName();
        }

        function showMeetingSelection() {
            if(teacherInputSection) teacherInputSection.classList.add('hidden');
            if(welcomeBackSection) welcomeBackSection.classList.add('hidden');
            if(welcomeMessage) welcomeMessage.classList.add('hidden');
            if(meetingSelectionSection) meetingSelectionSection.classList.remove('hidden');
            
            const grid = document.getElementById('meetingGrid');
            if(grid) {
                grid.innerHTML = '';
                for (let i = 1; i <= 12; i++) {
                    const btn = document.createElement('button');
                    const isLocked = !meetingData[i] || (i > 1 && meetingData[i].length === 1 && meetingData[i][0].content.includes("Soon"));
                    
                    let topic = "Belum tersedia";
                    if (!isLocked) {
                        const mainSlide = meetingData[i].find(s => s.title.startsWith(`Meeting ${i}:`)) || meetingData[i][0];
                        if (mainSlide) {
                            const titleParts = mainSlide.title.split(': ');
                            if (titleParts.length > 1) {
                                topic = titleParts[1];
                            } else {
                                topic = mainSlide.subtitle || "Klik untuk mulai";
                            }
                        }
                    }

                    btn.className = `p-4 rounded-xl border transition-all duration-300 flex flex-col items-center justify-center gap-2 ${!isLocked ? 'bg-white shadow-sm border-slate-200 hover:bg-slate-50 hover:border-blue-400 hover:shadow-md hover:scale-105 cursor-pointer' : 'bg-slate-100 border-slate-200 opacity-50 cursor-not-allowed'}`;
                    btn.innerHTML = `
                        <span class="text-2xl font-bold ${!isLocked ? 'text-slate-800' : 'text-slate-400'}">Meeting ${i}</span>
                        <span class="text-xs text-center ${!isLocked ? 'text-blue-600' : 'text-slate-400'}">${topic}</span>
                    `;
                    if (!isLocked) btn.onclick = () => selectMeeting(i);
                    grid.appendChild(btn);
                }
            }
        }

        function selectMeeting(id) {
            currentMeeting = id;
            currentSlide = 1;
            if(welcomeOverlay) welcomeOverlay.style.opacity = '0';
            setTimeout(() => {
                if(welcomeOverlay) welcomeOverlay.style.display = 'none';
                const mainContent = document.getElementById('mainContent');
                if(mainContent) {
                    mainContent.classList.remove('hidden');
                    setTimeout(() => {
                        mainContent.classList.remove('opacity-0');
                        renderSidebar();
                        renderSlide();
                    }, 50);
                }
            }, 1000);
        }

        // --- DOM Elements ---
        const els = {
            meetingNav: document.getElementById('meetingNav'),
            slideContainer: document.getElementById('slideContainer'),
            slideTitle: document.getElementById('slideTitle'),
            slideSubtitle: document.getElementById('slideSubtitle'),
            slideContent: document.getElementById('slideContent'),
            meetingTag: document.getElementById('meetingTag'),
            slideCounter: document.getElementById('slideCounter'),
            progressBar: document.getElementById('progressBar'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            hamburgerBtn: document.getElementById('hamburgerBtn'),
            closeSidebarBtn: document.getElementById('closeSidebarBtn'),
            sidebar: document.getElementById('sidebar'),
            sidebarOverlay: document.getElementById('sidebarOverlay'),
            mainScrollArea: document.getElementById('mainScrollArea')
        };

        // --- Initialization ---
        function init() {
            if (typeof checkTeacherName === 'function') {
                checkTeacherName();
            }
            renderSidebar();
            renderSlide();
        }

        // --- Core Functions ---

        // --- Instructor Name Logic ---
        function saveInstructorName() {
            const input = document.getElementById('instructorInput');
            if (input && input.value.trim() !== "") {
                localStorage.setItem('kalananti_instructor_name', input.value.trim());
                renderInstructorName();
            }
        }

        function resetInstructorName() {
            localStorage.removeItem('kalananti_instructor_name');
            renderInstructorName();
        }

        function renderInstructorName() {
            const container = document.getElementById('instructor-name-container');
            if (!container) return;

            const storedName = localStorage.getItem('kalananti_instructor_name');

            if (storedName) {
                container.innerHTML = `
                    <div class="space-y-4">
                        <h3 class="text-3xl font-extrabold text-slate-800 bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-green-500">
                            Halo, saya Kak ${storedName}!
                        </h3>
                        <button onclick="resetInstructorName()" class="text-xs text-slate-400 hover:text-red-500 underline transition-colors">
                            Ganti Nama
                        </button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="flex flex-col items-center gap-3">
                        <label class="text-slate-600 font-medium">Siapa nama Kakak?</label>
                        <div class="flex gap-2">
                            <input type="text" id="instructorInput" placeholder="Ketik nama di sini..." 
                                class="border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 outline-none w-64 text-center"
                                onkeypress="if(event.key === 'Enter') saveInstructorName()">
                            <button onclick="saveInstructorName()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-all font-bold shadow-md">
                                Simpan
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function showMiniFeedback(targetId, message, type = 'success') {
            const target = document.getElementById(targetId);
            if (!target) return;

            const styles = {
                success: 'bg-green-50 border-green-200 text-green-800',
                warn: 'bg-yellow-50 border-yellow-200 text-yellow-800',
                error: 'bg-red-50 border-red-200 text-red-800'
            };

            target.className = `rounded-xl border p-3 text-sm font-semibold ${styles[type] || styles.success}`;
            target.textContent = message;
        }

        function toggleReveal(targetId) {
            const target = document.getElementById(targetId);
            if (!target) return;
            target.classList.toggle('hidden');
        }

        function renderSidebar() {
            els.meetingNav.innerHTML = '';
            for (let i = 1; i <= totalMeetings; i++) {
                const btn = document.createElement('button');
                const isActive = (i === currentMeeting);
                
                const isLocked = !meetingData[i];
                
                // Styling classes
                const baseClasses = "w-full text-left p-3 rounded-xl transition-all duration-200 flex items-center gap-3";
                const activeClasses = "bg-gradient-to-r from-blue-50 to-green-50 border border-blue-100 shadow-sm";
                const inactiveClasses = isLocked 
                    ? "opacity-50 cursor-not-allowed bg-slate-50 border border-transparent text-slate-400" 
                    : "hover:bg-slate-50 border border-transparent hover:border-slate-100 text-slate-500";
                
                btn.className = `${baseClasses} ${isActive ? activeClasses : inactiveClasses}`;
                if (!isLocked) btn.onclick = () => switchMeeting(i);
                
                // Colors for the number circle
                const circleClass = isActive 
                    ? "bg-blue-600 text-white shadow-md shadow-blue-200" 
                    : "bg-slate-200 text-slate-500 group-hover:bg-slate-300";

                // Find the slide that acts as the "Main Title" (starts with "Meeting X:")
                // If not found, fall back to the first slide
                const mainSlide = meetingData[i] ? (meetingData[i].find(s => s.title.startsWith(`Meeting ${i}:`)) || meetingData[i][0]) : null;
                
                let topic = "Belum tersedia";
                if (mainSlide) {
                    const titleParts = mainSlide.title.split(': ');
                    if (titleParts.length > 1) {
                         topic = titleParts[1].replace(/[\u{1F300}-\u{1F9FF}]/gu, ''); 
                         topic = titleParts[1]; 
                    } else {
                        topic = mainSlide.subtitle;
                    }
                }

                btn.innerHTML = `
                    <span class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-sm font-bold transition-colors ${circleClass}">
                        ${i}
                    </span>
                    <div class="flex-1 min-w-0">
                        <div class="text-sm font-bold truncate ${isActive ? 'text-slate-800' : 'text-slate-600'}">Meeting ${i}</div>
                        <div class="text-xs truncate ${isActive ? 'text-blue-600' : 'text-slate-400'}">${topic}</div>
                    </div>
                    ${isActive ? '<span class="text-green-500 font-bold">●</span>' : ''}
                `;
                
                els.meetingNav.appendChild(btn);
            }
        }

        function switchMeeting(meetNum) {
            currentMeeting = meetNum;
            currentSlide = 1;
            renderSidebar();
            renderSlide();
            closeSidebar(); // On mobile
        }

        function renderSlide() {
             // Animate Out
            els.slideContainer.style.opacity = '0';
            els.slideContainer.style.transform = 'translateY(10px) scale(0.98)';

            setTimeout(() => {
                // Update Content
                const slides = meetingData[currentMeeting];
                const slide = slides[currentSlide - 1];

                els.meetingTag.textContent = `Meeting ${currentMeeting}`; // Update tag
                els.slideTitle.textContent = slide.title;
                els.slideSubtitle.textContent = slide.subtitle;
                els.slideContent.innerHTML = slide.content;

                // Update Footer
                els.slideCounter.textContent = `Slide ${currentSlide} / ${slides.length}`;
                
                // Update Progress Bar
                const progressPercent = (currentSlide / slides.length) * 100;
                els.progressBar.style.width = `${progressPercent}%`;

                // Update Buttons
                els.prevBtn.disabled = (currentSlide === 1);
                els.nextBtn.disabled = (currentSlide === slides.length);

                // Animate In
                els.slideContainer.style.opacity = '1';
                els.slideContainer.style.transform = 'translateY(0) scale(1)';

                // Render Instructor Name if applicable
                if (currentMeeting === 1 && currentSlide === 1) {
                    renderInstructorName();
                }
                
                // Reset Scroll
                els.mainScrollArea.scrollTop = 0;

            }, 300);
        }

        function nextSlide() {
            const slides = meetingData[currentMeeting];
            if (currentSlide < slides.length) {
                currentSlide++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (currentSlide > 1) {
                currentSlide--;
                renderSlide();
            }
        }

        // --- Sidebar Logic ---
        function openSidebar() {
            els.sidebar.classList.remove('-translate-x-full');
            els.sidebarOverlay.classList.remove('hidden');
            setTimeout(() => els.sidebarOverlay.classList.remove('opacity-0'), 10);
        }

        function closeSidebar() {
            els.sidebar.classList.add('-translate-x-full');
            els.sidebarOverlay.classList.add('hidden');
        }

        // --- Event Listeners ---
        els.nextBtn.addEventListener('click', nextSlide);
        els.prevBtn.addEventListener('click', prevSlide);
        
        els.hamburgerBtn.addEventListener('click', openSidebar);
        els.closeSidebarBtn.addEventListener('click', closeSidebar);
        els.sidebarOverlay.addEventListener('click', closeSidebar);

        // Keyboard Nav
        document.addEventListener('keydown', (e) => {
            const activeTag = document.activeElement?.tagName?.toLowerCase();
            if (activeTag === 'input' || activeTag === 'textarea') return;
            if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
            if (e.key === 'ArrowLeft') prevSlide();
        });

        // Start
        init();

    </script>
